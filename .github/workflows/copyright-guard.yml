name: Copyright Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  copyright-guard:
    name: copyright-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify permanent attribution records
        run: python3 scripts/verify_copyright.py
